<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>🎀 Birthday — Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;}
body{background:#05000a;color:#fff;}

/* ══════ COUNTDOWN PAGE ══════ */
#countdownPage{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse at 40% 40%,#1a0520 0%,#05000a 80%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:15px 20px;
  opacity:0;pointer-events:none;transition:opacity 0.8s;
  overflow:hidden;
}
#countdownPage.active{opacity:1;pointer-events:all;}
#countdownPage canvas{position:absolute;inset:0;pointer-events:none;}

.cd-top-badge{
  font-size:11px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,200,240,0.5);margin-bottom:16px;
  animation:fadeUp 1s ease both;
}
.cd-main-emoji{font-size:3.5rem;animation:floatBob 3s ease-in-out infinite,fadeUp 0.8s ease both;margin-bottom:8px;}
@keyframes floatBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.cd-title{
  font-family:'Great Vibes',cursive;font-size:clamp(2.2rem,7vw,4.5rem);
  color:#fff;line-height:1.1;
  text-shadow:0 0 60px rgba(255,150,220,0.9),0 0 120px rgba(200,100,255,0.4);
  animation:fadeUp 1s 0.3s ease both;opacity:0;margin-bottom:6px;
}
.cd-sub-title{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1rem,3vw,1.4rem);color:rgba(255,200,240,0.75);
  animation:fadeUp 1s 0.6s ease both;opacity:0;margin-bottom:32px;
}
.cd-cal-toggle{
  display:flex;gap:0;margin-bottom:28px;
  background:rgba(255,255,255,0.06);border-radius:50px;padding:1px;
  border:1px solid rgba(255,255,255,0.12);
  animation:fadeUp 1s 0.8s ease both;opacity:0;
}
.cd-cal-btn{
  padding:8px 22px;border-radius:50px;border:none;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:0.1em;cursor:pointer;transition:all 0.3s;
  background:transparent;color:rgba(255,255,255,0.5);
}
.cd-cal-btn.active{background:rgba(255,255,255,0.18);color:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.cd-grid{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  margin-bottom:10px;animation:fadeUp 1s 1s ease both;opacity:0;
}
.cd-unit{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);
  border-radius:16px;padding:14px 16px;min-width:72px;
  backdrop-filter:blur(10px);
}
.cd-unit-num{
  font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3.5vw,2rem);
  color:#fff;line-height:1;font-weight:700;
  text-shadow:0 0 20px rgba(255,150,220,0.6);white-space:nowrap;
}
.cd-unit-label{
  font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,200,240,0.55);margin-top:4px;
}
.cd-message{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(0.95rem,2.5vw,1.2rem);color:rgba(255,200,240,0.8);
  line-height:1.9;max-width:480px;
  animation:fadeUp 1s 1.2s ease both;opacity:0;margin-bottom:8px;
}
.cd-message strong{
  font-family:'Dancing Script',cursive;font-size:1.25em;
  color:#fff;font-style:normal;
}
.cd-cant-wait{
  font-family:'Dancing Script',cursive;font-size:clamp(1.1rem,3vw,1.6rem);
  color:rgba(255,180,230,0.9);
  animation:fadeUp 1s 1.4s ease both;opacity:0;
  text-shadow:0 0 20px rgba(255,150,220,0.5);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* Timeline icon button */
.cd-timeline-btn{
  position:fixed;top:14px;right:14px;z-index:5100;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
  border-radius:50%;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;cursor:pointer;color:rgba(255,200,240,0.8);
  transition:background 0.2s,transform 0.2s;
  backdrop-filter:blur(6px);
  box-shadow:0 4px 18px rgba(0,0,0,0.3);
  opacity:0;pointer-events:none;
}
.cd-timeline-btn.visible{opacity:1;pointer-events:all;}
.cd-timeline-btn:hover{background:rgba(255,150,220,0.22);transform:scale(1.12);}

/* ══════ TIMELINE PAGE ══════ */
#timelinePage{
  position:fixed;inset:0;z-index:5500;
  background:radial-gradient(ellipse at 40% 30%,#1a0528 0%,#060010 100%);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity 0.4s;
  overflow:hidden;
}
#timelinePage.active{opacity:1;pointer-events:all;}
.tl-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px 14px;
  border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;
}
.tl-header-title{
  font-family:'Great Vibes',cursive;font-size:1.9rem;
  color:#fff;text-shadow:0 0 30px rgba(255,150,220,0.7);
}
.tl-header-close{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.75);width:34px;height:34px;border-radius:50%;
  font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.2s;
}
.tl-header-close:hover{background:rgba(255,255,255,0.22);}
.tl-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:32px 20px 40px;}
.tl-grid{display:flex;flex-direction:column;gap:0;max-width:600px;margin:0 auto;}
.tl-row{display:flex;align-items:center;}
.tl-row.rtl{flex-direction:row-reverse;}
.tl-h-line{
  flex:1;height:3px;
  background:linear-gradient(90deg,rgba(255,150,220,0.5),rgba(200,100,255,0.3));
}
.tl-row.rtl .tl-h-line{
  background:linear-gradient(270deg,rgba(255,150,220,0.5),rgba(200,100,255,0.3));
}
.tl-v-connector{display:flex;height:40px;position:relative;}
.tl-v-connector.from-right{justify-content:flex-end;}
.tl-v-connector.from-left{justify-content:flex-start;}
.tl-v-line{width:3px;background:linear-gradient(180deg,rgba(200,100,255,0.5),rgba(255,150,220,0.3));border-radius:2px;height:100%;}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;flex-shrink:0;padding:0 4px;}
.tl-node-dot{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  transition:transform 0.22s,box-shadow 0.22s;
}
.tl-node.past .tl-node-dot{
  background:linear-gradient(135deg,rgba(255,150,220,0.3),rgba(200,100,255,0.25));
  border:2px solid rgba(255,150,220,0.6);box-shadow:0 0 18px rgba(255,150,220,0.25);
}
.tl-node.past .tl-node-dot:hover{transform:scale(1.15);box-shadow:0 0 32px rgba(255,150,220,0.55);}
.tl-node.current .tl-node-dot{
  background:linear-gradient(135deg,rgba(255,100,180,0.55),rgba(160,60,255,0.45));
  border:2px solid rgba(255,150,220,0.9);
  box-shadow:0 0 28px rgba(255,150,220,0.5),0 0 0 6px rgba(255,150,220,0.1);
  animation:tlPulse 2s ease-in-out infinite;
}
@keyframes tlPulse{
  0%,100%{box-shadow:0 0 28px rgba(255,150,220,0.5),0 0 0 6px rgba(255,150,220,0.1);}
  50%{box-shadow:0 0 40px rgba(255,150,220,0.8),0 0 0 10px rgba(255,150,220,0.15);}
}
.tl-node.future .tl-node-dot{
  background:rgba(255,255,255,0.04);border:2px dashed rgba(255,255,255,0.14);
}
.tl-node-year{
  font-family:'Dancing Script',cursive;font-size:0.95rem;
  color:rgba(255,255,255,0.8);line-height:1;text-align:center;white-space:nowrap;
}
.tl-node-sub{font-size:7.5px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,200,240,0.4);text-align:center;white-space:nowrap;}
.tl-node.current .tl-node-year{color:#fff;font-size:1.05rem;}
.tl-node.current .tl-node-sub{color:rgba(255,200,240,0.7);}
.tl-node-gift-btn{
  font-size:8px;letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(255,150,220,0.85);background:none;border:none;
  cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;
  transition:color 0.2s;margin-top:2px;
}
.tl-node-gift-btn:hover{color:#fff;}
</style>
</head>
<body>

<div id="countdownPage">
  <canvas id="cdStars"></canvas>
  <button class="cd-timeline-btn" id="cdTimelineBtn" onclick="openTimeline()" title="Birthday Timeline">📅</button>
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;">
    <div class="cd-top-badge">✦ &nbsp; A Special Day Is Coming &nbsp; ✦</div>
    <div class="cd-main-emoji">🎀</div>
    <div class="cd-title">My Precious One's<br>Birthday</div>
    <div class="cd-sub-title">is just around the corner...</div>
    <div class="cd-cal-toggle">
      <button class="cd-cal-btn active" id="cdBtnBS" onclick="switchCal('BS')"><span id="cdDateBS">— — —</span></button>
      <button class="cd-cal-btn" id="cdBtnAD" onclick="switchCal('AD')"><span id="cdDateAD">— — —</span></button>
    </div>
    <div class="cd-grid" id="cdGrid">
      <div class="cd-unit"><div class="cd-unit-num" id="cdMonths">--</div><div class="cd-unit-label">Months</div></div>
      <div class="cd-unit"><div class="cd-unit-num" id="cdWeeks">--</div><div class="cd-unit-label">Weeks</div></div>
      <div class="cd-unit"><div class="cd-unit-num" id="cdDays">--</div><div class="cd-unit-label">Days</div></div>
      <div class="cd-unit"><div class="cd-unit-num" id="cdHours">--</div><div class="cd-unit-label">Hours</div></div>
      <div class="cd-unit"><div class="cd-unit-num" id="cdMins">--</div><div class="cd-unit-label">Minutes</div></div>
      <div class="cd-unit"><div class="cd-unit-num" id="cdSecs">--</div><div class="cd-unit-label">Seconds</div></div>
    </div>
    <div class="cd-message" id="cdMessage">
      <strong id="cdCountText">-- days</strong> left for my precious one's birthday —<br>can't wait for it! 🌸
    </div>
    <div class="cd-cant-wait">Can't wait to celebrate you! 🎉</div>
  </div>
</div>

<!-- Timeline page -->
<div id="timelinePage">
  <div class="tl-header">
    <div class="tl-header-title">Birthday Timeline 🎀</div>
    <button class="tl-header-close" onclick="closeTimeline()">✕</button>
  </div>
  <div class="tl-scroll">
    <div class="tl-grid" id="tlGrid"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  ★  CONFIGURATION  ★  — update each year
// ══════════════════════════════════════════════════════════════════
const BIRTHDAY_AD = { month: 3, day: 16 };
const BIRTHDAY_BS = { month: 12, day: 2 };
const BIRTHDAY_WINDOW_HOURS = 24;

// Add a new entry each birthday year
const GIFT_YEARS = [
  { adYear:2026, bsYear:2082, file:'2026.html', unlockAD:'2026-03-16', unlockBS:'2082-12-2' },
  { adYear:2027, bsYear:2083, file:'2027.html', unlockAD:'2027-03-16', unlockBS:'2083-12-2' },
];

// ══════════════════════════════════════════════════════════════════
//  BS ↔ AD CONVERSION
// ══════════════════════════════════════════════════════════════════
const BS_MONTH_DAYS = {
  2080:[31,32,31,32,31,30,30,30,29,30,29,31],
  2081:[31,31,32,31,31,31,30,29,30,29,30,30],
  2082:[31,32,31,32,31,30,30,30,29,30,29,31],
  2083:[31,31,31,32,31,31,30,29,30,29,30,30],
  2084:[31,32,31,32,31,30,30,30,29,30,29,31],
  2085:[31,31,32,31,31,31,30,29,30,29,30,30],
};
const BS_MONTH_NAMES=['Baisakh','Jestha','Ashadh','Shrawan','Bhadra','Ashwin','Kartik','Mangsir','Poush','Magh','Falgun','Chaitra'];
const AD_MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

function bsToAd(bsYear,bsMonth,bsDay){
  const refAd=new Date(2024,3,14);
  const getData=y=>BS_MONTH_DAYS[y]||BS_MONTH_DAYS[2081];
  let totalDays=0;
  if(bsYear===2081&&bsMonth===1){totalDays=bsDay-1;}
  else if(bsYear===2081){
    totalDays=getData(2081)[0]-1;
    for(let m=1;m<bsMonth-1;m++) totalDays+=getData(2081)[m];
    totalDays+=bsDay;
  } else {
    totalDays=getData(2081)[0]-1;
    for(let m=1;m<12;m++) totalDays+=getData(2081)[m];
    for(let y=2082;y<bsYear;y++) totalDays+=getData(y).reduce((a,b)=>a+b,0);
    for(let m=0;m<bsMonth-1;m++) totalDays+=getData(bsYear)[m];
    totalDays+=bsDay;
  }
  const r=new Date(refAd); r.setDate(r.getDate()+totalDays); return r;
}
function adToBs(adDate){
  const refAd=new Date(2024,3,14);
  const diffDays=Math.floor((adDate-refAd)/(1000*60*60*24));
  let remaining=diffDays,bsYear=2081,bsMonth=1;
  const getData=y=>BS_MONTH_DAYS[y]||BS_MONTH_DAYS[2081];
  while(remaining>0){
    const mlen=getData(bsYear)[bsMonth-1];
    if(remaining<=mlen) break;
    remaining-=mlen; bsMonth++;
    if(bsMonth>12){bsMonth=1;bsYear++;}
  }
  return {year:bsYear,month:bsMonth,day:remaining+1};
}

function getNextBirthdayAD(){
  const now=new Date(),y=now.getFullYear();
  let b=new Date(y,BIRTHDAY_AD.month-1,BIRTHDAY_AD.day,0,0,0,0);
  if(now>=new Date(b.getTime()+BIRTHDAY_WINDOW_HOURS*3600000)) b.setFullYear(y+1);
  return b;
}
function getNextBirthdayBS(){
  const now=new Date(),cur=adToBs(now);
  let y=cur.year,ad=bsToAd(y,BIRTHDAY_BS.month,BIRTHDAY_BS.day);
  if(now>=new Date(ad.getTime()+BIRTHDAY_WINDOW_HOURS*3600000)) ad=bsToAd(y+1,BIRTHDAY_BS.month,BIRTHDAY_BS.day);
  return ad;
}

// ══════════════════════════════════════════════════════════════════
//  COUNTDOWN
// ══════════════════════════════════════════════════════════════════
let activeCal='BS';
function switchCal(cal){
  activeCal=cal;
  ['AD','BS'].forEach(c=>document.getElementById('cdBtn'+c).classList.toggle('active',c===cal));
  updateCountdown();
}

function updateCountdown(){
  const now=new Date();
  const target=activeCal==='AD'?getNextBirthdayAD():getNextBirthdayBS();
  const diff=target-now;
  if(diff<=0){
    // Navigate to this year's gift file
    const yr=new Date().getFullYear();
    const entry=GIFT_YEARS.find(e=>e.adYear===yr);
    if(entry) window.location.href=entry.file+'?ref=timeline';
    else window.location.reload();
    return;
  }
  const tS=Math.floor(diff/1000),tM=Math.floor(tS/60),tH=Math.floor(tM/60),tD=Math.floor(tH/24),tW=Math.floor(tD/7),tMo=Math.floor(tD/30.44);
  document.getElementById('cdMonths').textContent=tMo.toLocaleString();
  document.getElementById('cdWeeks').textContent=tW.toLocaleString();
  document.getElementById('cdDays').textContent=tD.toLocaleString();
  document.getElementById('cdHours').textContent=tH.toLocaleString();
  document.getElementById('cdMins').textContent=tM.toLocaleString();
  document.getElementById('cdSecs').textContent=tS.toLocaleString();
  let str='';
  if(tMo>0) str=`${tMo} month${tMo>1?'s':''} & ${tD%30} day${tD%30!==1?'s':''}`;
  else if(tW>0) str=`${tW} week${tW>1?'s':''} & ${tD%7} day${tD%7!==1?'s':''}`;
  else if(tD>0) str=`${tD} day${tD!==1?'s':''}`;
  else if(tH>0) str=`${tH} hour${tH!==1?'s':''} & ${tM%60} min${tM%60!==1?'s':''}`;
  else str=`${tM%60}m ${tS%60}s`;
  document.getElementById('cdCountText').textContent=str;
  document.getElementById('cdDateAD').textContent=`${AD_MONTH_NAMES[BIRTHDAY_AD.month-1]} ${BIRTHDAY_AD.day}`;
  document.getElementById('cdDateBS').textContent=`${BS_MONTH_NAMES[BIRTHDAY_BS.month-1]} ${BIRTHDAY_BS.day}`;
}

// ══════════════════════════════════════════════════════════════════
//  TIMELINE
// ══════════════════════════════════════════════════════════════════
function openTimeline(){
  buildTimeline();
  document.getElementById('timelinePage').classList.add('active');
  document.getElementById('cdTimelineBtn').classList.remove('visible');
}
function closeTimeline(){
  document.getElementById('timelinePage').classList.remove('active');
  document.getElementById('cdTimelineBtn').classList.add('visible');
}
function openGiftYear(file){
  window.location.href = file + '?ref=timeline';
}

function isYearUnlocked(entry){
  const todayStr = new Date().toISOString().slice(0,10);
  if(todayStr >= entry.unlockAD) return true;
  if(todayStr >= entry.unlockBS) return true;
  return false;
}

function buildTimeline(){
  const grid=document.getElementById('tlGrid');
  if(!grid) return;
  grid.innerHTML='';
  const now=new Date();
  const nextBday=getNextBirthdayAD();
  const todayStr=now.toISOString().slice(0,10);

  // Build node list from GIFT_YEARS + current + 5 future
  const giftMap={};
  GIFT_YEARS.forEach(e=>{ giftMap[e.adYear]=e; });

  const nextYear=nextBday.getFullYear();
  const allNodes=[];

  // Past years from GIFT_YEARS
  GIFT_YEARS.forEach(e=>{
    if(e.adYear < nextYear){
      allNodes.push({
        adYear:e.adYear, bsYear:e.bsYear, type:'past',
        file:e.file, unlocked: isYearUnlocked(e)
      });
    }
  });

  // Current year
  const curEntry = giftMap[nextYear];
  allNodes.push({
    adYear:nextYear, bsYear:nextYear+56, type:'current',
    file: curEntry ? curEntry.file : null,
    unlocked: curEntry ? isYearUnlocked(curEntry) : false
  });

  // 5 future years
  for(let i=1;i<=5;i++){
    const yr=nextYear+i;
    const fe=giftMap[yr];
    allNodes.push({adYear:yr,bsYear:yr+56,type:'future',file:fe?fe.file:null,unlocked:fe?isYearUnlocked(fe):false});
  }

  const COLS=3;
  const rows=[];
  for(let i=0;i<allNodes.length;i+=COLS) rows.push(allNodes.slice(i,i+COLS));

  rows.forEach((rowNodes,rowIdx)=>{
    const isRTL=rowIdx%2===1;
    const display=isRTL?[...rowNodes].reverse():rowNodes;
    const rowDiv=document.createElement('div');
    rowDiv.className='tl-row'+(isRTL?' rtl':'');

    display.forEach((node,colIdx)=>{
      const isClickable=!!node.file && node.unlocked;
      const emoji=node.type==='past'?(node.unlocked?'🎁':'🔒'):node.type==='current'?'🎀':'✨';
      const subLabel=node.type==='past'?(node.unlocked?'Birthday gifts':'Not yet 🌸'):node.type==='current'?'This birthday ✨':'Coming soon';
      const giftBtn=isClickable?`<button class="tl-node-gift-btn" onclick="openGiftYear('${node.file}')">Open gifts →</button>`:'';
      const dotClick=isClickable?` onclick="openGiftYear('${node.file}')" style="cursor:pointer;"`:` style="cursor:default;"`;

      const nodeDiv=document.createElement('div');
      nodeDiv.className=`tl-node ${node.type==='past'&&!node.unlocked?'future':node.type}`;
      nodeDiv.innerHTML=`
        <div class="tl-node-dot"${dotClick}>${emoji}</div>
        <div class="tl-node-year">${node.adYear}<br><span style="opacity:0.45;font-size:0.8em;">BS ${node.bsYear}</span></div>
        <div class="tl-node-sub">${subLabel}</div>
        ${giftBtn}`;
      rowDiv.appendChild(nodeDiv);

      if(colIdx<display.length-1){
        const line=document.createElement('div');
        line.className='tl-h-line';
        rowDiv.appendChild(line);
      }
    });

    grid.appendChild(rowDiv);

    if(rowIdx<rows.length-1){
      const vConn=document.createElement('div');
      vConn.className='tl-v-connector '+(isRTL?'from-left':'from-right');
      vConn.style.paddingLeft=isRTL?'26px':'0';
      vConn.style.paddingRight=isRTL?'0':'26px';
      vConn.innerHTML='<div class="tl-v-line"></div>';
      grid.appendChild(vConn);
    }
  });

  setTimeout(()=>{
    grid.querySelectorAll('.tl-node').forEach((n,i)=>{
      n.style.opacity='0';n.style.transform='scale(0.7)';
      n.style.transition=`opacity 0.4s ${i*0.07}s,transform 0.4s ${i*0.07}s`;
      requestAnimationFrame(()=>requestAnimationFrame(()=>{n.style.opacity='1';n.style.transform='scale(1)';}));
    });
  },60);
}

// ══════════════════════════════════════════════════════════════════
//  STARFIELD
// ══════════════════════════════════════════════════════════════════
function initStars(){
  const c=document.getElementById('cdStars');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const cx=c.getContext('2d');
  const stars=[];
  for(let i=0;i<220;i++) stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.6+0.3,ph:Math.random()*Math.PI*2,sp:Math.random()*0.012+0.004});
  function draw(){cx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.ph+=s.sp;const a=0.15+0.85*Math.abs(Math.sin(s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${a})`;cx.fill();});requestAnimationFrame(draw);}
  draw();
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
(function(){
  const cd=document.getElementById('countdownPage');
  cd.style.display='flex';
  requestAnimationFrame(()=>{
    cd.classList.add('active');
    setTimeout(()=>document.getElementById('cdTimelineBtn').classList.add('visible'),800);
  });
  initStars();
  updateCountdown();
  setInterval(updateCountdown,1000);
})();
</script>
</body>
</html>
